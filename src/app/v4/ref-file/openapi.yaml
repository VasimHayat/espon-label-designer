    integerIdNullable:
      description: 'A positive non-zero, integer ID 1,2,...'
      type: integer
      minimum: 1
    job:
      type: object
      description: |
        Object whose keys are jobIds and values are job objects.
      additionalProperties:
        type: object
        required:
          - jobId
          - name
          - rules
        properties:
          jobId:
            $ref: '#/components/schemas/integerId'
          name:
            type: string
          rules:
            description: A set of rules pertaining to a timeslip using this job.
            type: object
            properties:
              claimTips:
                type: boolean
                description: >
                  When true, the timeslip job must record their cash tips when
                  clocking out.
                default: true
              autoLogout:
                type: integer
                description: >
                  Autologout after this many seconds idle. A value of 0 disables
                  feature and there will be no auto logout.
                default: 360
              canOwnOrder:
                type: boolean
                description: 'When true, the timeslip can own an order.'
                default: true
              canPayInOut:
                type: boolean
                description: |
                  When true, the timeslip can create a Pay In/Out.
              canPayOrder:
                type: boolean
                description: |
                  When true, the timeslip can create transactions for an order.
                default: true
              isManager:
                description: Moved from employee.
                type: boolean
              timeClockOnly:
                type: boolean
                description: |
                  When true, the timeslip can not access Orders or Pay In/Outs.
              closeReportType:
                type: string
                description: >
                  This value controls the variation of close report printed for
                  this timeslip.
                enum:
                  - cash
                  - sales
                default: sales
              canAddToSafeCount:
                type: boolean
              canCloseDay:
                type: boolean
              canSellGiftCards:
                description: 'When true, the timeslip can sell Gift Cards.'
                type: boolean
              canReopenCheck:
                description: >-
                  When true, the job can reopen a check without manager
                  approval.
                type: boolean
              canTransferOrder:
                description: >
                  When true, the timeslip can transfer an order to another open
                  timeslip.
                type: boolean
              claimTipsToOthers:
                description: >
                  When true, the timeslip must record cash tips paid to others
                  after claiming their own cash tips.
                type: boolean
              hasNosaleOverride:
                description: |
                  When true, the timeslip can open a cashdrawer with out a sale.
                type: boolean
              canEditUnownedOrder:
                description: |
                  When true, the timeslip can modify an order they do not own.
                type: boolean
              canPayOrderWithCash:
                description: |
                  When true, the timeslip can create a Cash transaction.
                type: boolean
              defaultOrderClassId:
                description: >
                  When not null, the system will set the initial order-class to
                  this one.  When null, the system will set the initial
                  order-class to the terminal default order-class (unless that
                  also has a null value). Otherwise, the system will set the
                  initial order-class to the first one in the list of
                  order-classes.
                type: integer
                nullable: true
              listOrdersByJobMatch:
                description: >
                  The rule only applies to listing open orders. With a false
                  timeslip job rule of *Can-Own-Order*, the system returns only
                  the orders owned by this timeslip. Otherwise, with a false
                  rule, the system will return all orders and with a true rule,
                  the system will return only those orders owned by timeslips
                  that have the same job as the requesting timelip.
                type: boolean
              listTimeslipsByJobMatch:
                description: >
                  When true, the system list only timeslips that have the same
                  job. Used for transferring orders.
                type: boolean
              requireDrawerBalances:
                description: >
                  When  true, the timeslip must record an opening balance before
                  they can create order transactions and must record a closing
                  balance before clocking-out.
                type: boolean
              forceTipEntryOnClockout:
                description: >
                  When true, the timeslip must verify or enter credit card tips
                  when clocking out (provided a true rule allowing order
                  payment). (NOT IMPLEMENTED)
                type: boolean
              noPinEntry:
                description: Normally only set true for a manager to increase security.
                type: boolean
