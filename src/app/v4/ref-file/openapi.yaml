    ruleValue:
      type: object
      description: >
        Object whose keys are rule names and values are the named rule's current
        setting.
      properties:
        autoclose.startBefore:
          description: >
            Used to determine when Automatic-Closing will occur by subtracting
            its value from the Start-Hour for the Store. Start-Before must be
            greater than -30 and less than 120 (minutes). Negative values will
            cause the Automatic-Closing to occur after the Start-Hour. The
            default value of 1 causes Automatic-Closing to start 1 minute before
            the Start-Hour. The Start-Hour is specified on the "Store" page.
          type: number
        autoclose.settlePax:
          description: >
            When true, also send a close batch command to settle pax devices on
            store start hour.
          type: boolean
        allowAutoclosedOrders:
          description: >
            When false, the Close Day request will throw an error
            (autoclose.openOrders) when open orders exist. When true, it will
            close any open orders and not throw an error.
          type: boolean
        cashDrawer.mrfNosaleOpen:
          description: >
            A Manager is required to have no sale cash drawer open function,
            unless overridden for Job Class.
          type: boolean
        creditCardMaxAmount:
          description: >
            The maximum allowed to get charged for a credit card. A value of
            zero (0) will allow any value.
          default: 99999
          type: integer
        creditCardNoBatchDaysAllowed:
          description: >
            The number of days the system will still allow for credit card
            transactions since the last successful batch.
          default: 2
          type: integer
        hasSafeManagement:
          description: 'If true, the store uses safe management module.'
          type: boolean
        mrfPayIn:
          description: >
            If true, a manager is required for pay ins. If in doubt, set to
            false.
          type: boolean
        mrfPayOut:
          description: >
            If true, a manager is required for pay outs. If in doubt, set to
            false.
          type: boolean
        nameFormat:
          $ref: '#/components/schemas/nameFormat'
        nameFormatForReceipts:
          $ref: '#/components/schemas/nameFormat'
        noPadForAuthorize:
          description: >
            If true, a Manager may not use the Key Pad to authorize (approve) an
            action; They must swipe. (Note that biometric components might
            override this rule).
          type: boolean
        order.allowCreateWithOpenDrawer:
          type: boolean
        order.ccAutoprintMin:
          allOf:
            - description: >
                Credit Card signing slips will automatically print following
                authorizations greater than or equal to this amount.
            - $ref: '#/components/schemas/moneyValue'
        order.cashDiscountId:
          description: |
            This rule will create a Cash Discount by automatically adding a
            discount whenever a non-zero Cash transaction exists for a check.
            The rule value equals the Cash Discount discountId.
            The system will calculate the check.cashBalance using the Cash
            discount percentage so the customer will know how much cash to
            pay before the Cash discount gets automatically applied.
          type: integer
        order.ccReceiptPrinting:
          description: >
            Controls automatic credit card receipt printing. Manual printing
            will print both merchant and customer receipts.
          type: string
          enum:
            - none
            - merchant
            - customer
            - both
        order.disableCreditCardTips:
          description: >
            If false, the credit card receipt will contain a *tip* line and the
            payDevice will prompt for a tip entry. If true, tips can still get
            entered manually on the POS.
          type: boolean
        order.mrfTipExceeding:
          description: >
            The rule value equals a percentage between 0 and 200. The default
            value of the rule, 0, disables the rule. The calculation uses the
            check subtotal to allow for a large tip against a small transaction
            amount due to discounting.
               tip-percentage = 100*sum(tip)/subtotal
            When tip-percentage exceeds the rule amount, a mananger must
            authorize the tip, unless the tip was entered on the payDevice, then
            a message will appear on approval.
          type: number
        order.suggestedTips:
          description: >
            One of three possible values:

            - "defaults", means the system will use default values of 15, 18 and
            20.

            - "none", no suggested values will appear.

            - percentage list, a csv of one to five percentages, e.g., "15, 20,
            25".
          type: string
        order.useEntreeCount:
          description: 'When true, use entreeCount to compute guest count for reports.'
          type: boolean
        order.autoPrintReceipt:
          description: 'When true, when a check closes a final receipt is printed.'
          type: boolean
        order.skipFinalCheckAutoprint:
          deprecated: true
          description: >
            Normally when a check closes a final receipt is printed, activating
            this rule turns this behavior off.
          type: boolean
        order.omitBarcode:
          description: 'If true, no check-barcode is printed on receipts.'
          type: boolean
        order.baseDivisor:
          description: |
            - A value of 0 will not perform cash rounding.
            - A positive multiple of 5 will cause cash rounding to the
              nearest baseDivisor value resulting in rounding both up
              and down.
            - A negative multiple of 5 will cause cash rounding to always
              round down to the lesser baseDivisor value.
            - A non-multiple of 5 value will get set to 0 in the store.

            - A value of 0 will not perform cash rounding.
            - A positive value will cause rounding of the cash amount to
              the nearest multiple value, resulting overall in rounding
              that both increases and decreases the cash amount.
            - A negative value will cause rounding of the cash amount to
              always decrease to the lesser multiple of the cash amount.
            - A non-multiple of 5 value will get set to 0 in the store.

            **Examples for baseDivisor of 0, 5 and -5.**
            | Cash |    0 |    5 |   -5 |
            | -----|------|------|------|
            | 1.00 | 1.00 | 1.00 | 1.00 |
            | 1.01 | 1.01 | 1.00 | 1.00 |
            | 1.04 | 1.04 | 1.05 | 1.00 |
          type: integer
        order.printReceiptForTaxExempt:
          description: >
            When true, print a store copy of the receipt when the check was
            taxExempt.
          type: boolean
        order.taxCopy:
          description: >
            Alternate copy for "Tax" on the receipts, for example, "HST." If
            indoubt, leave blank.
          type: string
        order.taxGroupByLabel:
          description: >
            If true, taxes will be labeled and grouped by their labels, sorted
            alphabetically, overriding the Tax Copy setting. If in doubt, set to
            false.
          type: boolean
        order.callnumMax:
          description: >
            A Non Zero value activates the call number feature. A modulus of the
            order number and this setting will be printed on remote printouts as
            well as guest checks and receipts. This number may be announced to
            waiting customers to indicate their order is ready for pickup.
          type: number
        order.autoConsolidate:
          description: >
            If true, an order consolidation happens after an order send in cases
            when the items may have been modified. Consolidation means duplicate
            order items for each guest become consolidated into one order item
            with the appropriate total quantity.
          type: boolean
        order.maxDiscountsPerCheck:
          description: Discount only counted with a true *countsTowardsMax* property.
          type: integer
        order.startQuickSaleOnSend:
          description: >
            When true, on Sending on order, the IPA will create a new Quick-Sale
            order. Otherwise, a prompt to start a new Quick-Sale will appear
            when the terminal mode equals quickService.
          type: boolean
        order.useItemLookup:
          description: |
            If true, a barcode reader can be used to order items.
          type: boolean
        order.rollupPrices:
          description: >
            When true, the receipt will rollup the modifier prices into the
            parent item and display no price for each modifier if the parent
            item has a menu group with a true rollupPrices property.
          type: boolean
        order.recallByBarcode:
          description: >
            If true, a barcode reader can be used to recall Orders on the Area
            and Payment pages.
          type: boolean
        order.disableRepeat:
          description: 'If true, the Repeat button will be unavailable.'
          type: boolean
        order.autoNameQuicksaleOnSend:
          description: >
            If true, the system will prompt for the Order Name of a Quicksale
            when sending the Order for the first time if the order has not yet
            been named.
          type: boolean
        outstore.prepMins:
          description: >
            Average minutes required to prepare any order. Used when the
            prepMins was not provided from the outstore request. In the future,
            the pa or txserver might also compute the prepMins and use the rule
            as a backup.
          default: 15
          type: integer
        outstore.checkinWaitMins:
          description: >
            When the order.prepMode equals *checkin* how long before the order
            will get processed (order.state set to *inPrep*) unless and actual
            checkin occurs (set state to other than *hold*). The default equals
            8 hours.
          default: 480
          type: integer
        outstore.use:
          description: |
            If true, the system enables use of the Outstore API.
          type: boolean
        preventOldOpen:
          description: >
            If true, old (previous day or older) Orders and Pay In/Outs can not
            be reopened.
          type: boolean
        reports.cctipDeductionPercentage:
          description: >
            A Non Zero value will be used as a percentage amount to be deducted
            from the amount of credit card tips reported as cash due to servers
            at clockout. Note, Auto Gratuities are not included as they are not
            treated as credit card tips even if a credit card is used.
          type: number
        reports.close.barMix:
          description: Specify the Bar Mix Category ID or blank for none.
          type: string
        reports.close.maxDetailAllowed:
          description: >
            For the Timeslip Close Report, if the number of transactions exceed
            the rule value, then no details will get printed. If the rule has a
            zero value, all transaction details will get printed. If the rule
            has a value less than zero, no transaction details will get printed.
          default: 30
          type: integer
        reports.payPeriodStartDow:
          description: |
            Number indicating first day of pay period week (1=Monday, 7=Sunday).
          type: number
    ruleValues:
