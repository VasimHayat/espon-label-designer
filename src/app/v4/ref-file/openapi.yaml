    orderDetails:
      type: object
      description: holds various collections of things associated with an order.
      required:
        - head
        - items
        - guests
        - checks
        - transactions
      properties:
        head:
          $ref: '#/components/schemas/orderHead'
        items:
          description: Map of item number (jn) to item.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/orderItem'
        guests:
          description: Map of guest number (gn) to guest.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/guest'
        checks:
          description: >
            Map of check number (cn) to check. The number of checks must be <=
            the number of guests.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/check'
        transactions:
          description: >
            Map of transaction number (xn) to transaction. Each check has zero
            or more transactions.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/transaction'
    orderItem:
      type: object
      required:
        - jn
        - pjn
        - cjn
        - itemId
        - buttonName
        - name
        - price
        - ste
        - steFromOrderClass
        - newQuantity
        - quantity
        - padj
        - pnet
        - pcomp
        - ptotal
        - isVoided
        - created
      properties:
        jn:
          type: integer
          minimum: 1
          description: The item number (starts at 1 and increments).
        pjn:
          type: integer
          minimum: 1
          nullable: true
          description: >
            The item number of the parent order item. Null when item has no
            parent.
        cjn:
          type: array
          description: a list of child items (jn values) in display order.
          items:
            type: integer
            description: jn of child item
        itemId:
          type: integer
          description: from settings menuItem.id.
          minimum: 1
        buttonName:
          type: string
        remoteName:
          type: string
        name:
          type: string
        price:
          $ref: '#/components/schemas/moneyValue'
        ste:
          type: boolean
          description: Sales Tax Exempt
        steFromOrderClass:
          description: Sales Tax Exempt from Order Class.
          type: boolean
        quantity:
          description: the sent quantity
          type: number
        newQuantity:
          type: number
          description: >
            Has the total item quantity including unsent additions, so
            newQuantity > quantity (unless newQuantity = 0). After sending an
            Order, the quantity will have the newQuantity value and newQuantity
            = 0.
        locationQuantity:
          type: number
        portionQuantity:
          type: number
        jnRepeated:
          type: integer
        unit:
          $ref: '#/components/schemas/unit'
        tare:
          type: number
        isWeighed:
          type: boolean
        isPriceZero:
          type: boolean
        freeQnt:
          type: number
        padj:
          allOf:
            - description: >
                The price adjustment (comp).  A full comp would have a padj ==
                price. padj == 0 for no price adjustment.
            - $ref: '#/components/schemas/moneyValue'
        psnetc:
          allOf:
            - description: |
                The net price of a single item and its modifers.
                psnetc = pnetc/q = (p - a) + sum(cjn[](.p - .a))
            - $ref: '#/components/schemas/moneyValue'
        pnet:
          allOf:
            - description: The net price. pnet = quantity*(price - padj)
            - $ref: '#/components/schemas/moneyValue'
        pcomp:
          allOf:
            - description: The comp price. pcomp = quantity*price - pnet
            - $ref: '#/components/schemas/moneyValue'
        ptotal:
          allOf:
            - description: The total price. ptotal = quantity*price
            - $ref: '#/components/schemas/moneyValue'
        pnetc:
          allOf:
            - description: 'The net price child. pnetc = pnet + sum(cjn[].pnet)'
            - $ref: '#/components/schemas/moneyValue'
        pcompc:
          allOf:
            - description: 'The comp price child. pcompc = pcomp + sum(cjn[].pcomp)'
            - $ref: '#/components/schemas/moneyValue'
        pnetr:
          allOf:
            - description: >-
                The rollup net price child. pnetr = pnet +
                sum(rollup(cjn[].pnet))
            - $ref: '#/components/schemas/moneyValue'
        pidisc:
          allOf:
            - description: The item discount. pidisc = sum(item discounts for item)
            - $ref: '#/components/schemas/moneyValue'
        pcdisc:
          allOf:
            - description: The check discount. pcdisc = sum(check discounts for item)
            - $ref: '#/components/schemas/moneyValue'
        split:
          description: A map of guest number (gn) to pnet for that guest.
          type: object
          additionalProperties:
            type: integer
        disc:
          description: A map of transaction number (xn) to discount amount for item.
          type: object
          additionalProperties:
            type: integer
        adjReasonId:
          description: Null unless the item has a true isVoided or a comp.
          type: integer
        isVoided:
          type: boolean
        percentage:
          type: number
          minimum: 0
          maximum: 100
          description: How much to comp an item.
        text:
          type: string
          description: Additional instructions.
        created:
          $ref: '#/components/schemas/epoch'
        taxIds:
          type: array
          items:
            type: integer
        isRollup:
          type: boolean
        entreeCount:
          type: integer
        cookTime:
          type: integer
        refunds:
          description: A map of sinkOrderId to sourceOrder cn-quantity.
          type: object
          additionalProperties:
            type: object
            properties:
              cn:
                type: integer
              quantity:
                type: number
        status:
          allOf:
            - description: >
                The status of the item that requires processing, viz., giftcard
                or playcard activation/addValue (and voiding) or a loyalty comp.
            - $ref: '#/components/schemas/tranStatus'
        tacitItems:
          description: >
            A non-top, cvo, non-modified, default and not-autoAdded items used
            to hande nix.
          type: array
          items:
            type: object
            required:
              - itemId
            properties:
              itemId:
                type: integer
              parentId:
                type: integer
              nixTaken:
                type: number
        groupId:
          description: The fq creation group.
          type: integer
        parentId:
          type: integer
        rootItemId:
          description: for discounts
          type: integer
        portionId:
          type: integer
        varId:
          type: integer
        locId:
          type: integer
        notCompleted:
          description: List of calcMod.itemId values.
          type: array
          items:
            type: integer
        gc:
          $ref: '#/components/schemas/giftcardParams'
        pc:
          $ref: '#/components/schemas/playcardParams'
