    printerSection:
      type: array
      items:
        description: |
          An operator that has value based on the type.
          - newline, value does not matter.
          - text, string directly copied into output.
          - variable, a certain property of the order.
            Any such property can get prefixed by one of "if", "ef" and "ar".
            The "if" prefixed op will only execute when the property has been defined.
            The "ef" will only get executed when that property does has not been defined.
            Certain variables will only exist in an item and modifier section.
            - alternate
            - callnum
            - created
            - currentPage, only for labels.
            - customer
            - date, date of order readyTime or created.
            - destination
            - guest, the guest number.
            - guests, only when the guestCount > 1.
            - guestCount
            - indent, only in item or modifier sections.
            - itemName, only in item or modifier sections.
            - memo
            - name
            - onlineId
            - onlineProvider
            - originalReadyTime
            - orderClass
            - orderId
            - owner
            - paid
            - poweredBy
            - quantity, only in item or modifier sections.
            - readyTime
            - source
            - sourceId
            - style
            - tags
            - tagValue
            - totalPages, only for labels.
            - text, only in item or modifier sections.
            - time, time of order readyTime or created.
            - vprinterName
        type: object
        properties:
          type:
            description: >
              The hr will always have use a wide character, but the nhr will use
              a narrow character.
            type: string
            enum:
              - newline
              - text
              - token
              - variable
              - hr
              - nhr
              - section
          value:
            description: Depends on type.
            type: string
    printerSections:
      allOf:
        - type: object
          properties:
            header:
              $ref: '#/components/schemas/printerSection'
            guest:
              $ref: '#/components/schemas/printerSection'
            item:
              $ref: '#/components/schemas/printerSection'
            modifier:
              $ref: '#/components/schemas/printerSection'
            footer:
              $ref: '#/components/schemas/printerSection'
        - type: object
          description: >
            The key must equal another section defined here or any variable with
            a prefix (see sectionVariable enum).
          additionalProperties:
            $ref: '#/components/schemas/printerSection'
