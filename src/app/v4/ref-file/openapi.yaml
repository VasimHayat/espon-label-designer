        - status
    event:
      description: A event with daily occurance.
      type: object
      required:
        - id
        - name
      properties:
        id:
          $ref: '#/components/schemas/integerId'
        name:
          type: string
        startDate:
          description: >
            When null, indicates the event as currently active until the
            endDate.
          format: date
          type: string
        endDate:
          description: |
            When null, indicates the event has no end.
          format: date
          type: string
        startTime:
          description: >
            The time of day in hours and minutes, e.g., "10:23". If null, equals
            the start of day.
          type: integer
        endTime:
          description: >
            The time of day in hours and minutes, e.g., "10:23". If null, equals
            the end of day. If the endTime occurs before the startTime, the
            system will set the endTime to occur on the next day. For example,
            an event with a startTime of "21:00" and an endTime of "01:00" on a
            Fri will have the endTime actually occuring at "01:00" on Sat.
          type: integer
        days:
          description: >
            A unique set of days for this event to occur; otherwise null to
            undicate all days.
          type: array
          items:
            type: string
            enum:
              - Mon
              - Tue
              - Wed
              - Thu
              - Fri
              - Sat
              - Sun
    fee:
      description: |
        The fees setting allows implementation of auto-gratuity, Public
        Improvement Fee (pif), deliver and other miscellaneous fees.
        A fee will result in adding an item.
        An automatic fee can only get set once per Order by default.
        A true *setPerCheck* allows setting the same fee once per check.
        The prices of all the fee items for a check will get subtracted
        from the subtotal used to compute all discounts.
        An fee must have either a percentage or a fixed value.
        The menuItem used by the fee should not exist on the display menu
        to prevent normal ordering of that menuItem.
      type: object
      required:
        - feeId
        - name
        - itemId
      properties:
        feeId:
          type: integer
        name:
          description: The text that appears on the IPA for selectable fees.
          type: string
        itemId:
          description: The itemId of the menuItem to add for this fee.
          type: integer
        allowedOrderClasses:
          description: >
            A list of orderClasses which allow the fee. An empty list means all
            orderClasses not in the exemptOrderClasses allows the fee.
          type: array
          items:
            type: integer
        exemptOrderClasses:
          description: >
            A list of orderClasses which do not allow the fee. An empty list
            means all orderClasses allow the fee, in accordance with
            allowedOrderClasses.
          type: array
          items:
            type: integer
        isGratuity:
          type: boolean
        isDelivery:
          type: boolean
        percentage:
          description: |
            The fee equals the percentage times the Check non-fee subtotal.
          type: number
        fixed:
          description: The fee always equals the fixed value.
          type: number
        setPerCheck:
          description: >
            When false, the fee activation will use all the Guests in an Order
            otherwise, it will use only the guests assigned per Check.
          type: boolean
        always:
          description: |
            When true, the fee always gets activated. Useful for PIFs.
          type: boolean
        entreeCount:
          description: >
            When greater than zero, the fee gets activated when the Order or
            Check (depending on *setPerCheck*) entreeCount equals or exceeds the
            value.
          type: integer
        guestCount:
          description: >
            When greater than zero, the fee gets activated when the Order or
            Check (depending on *setPerCheck*) guestCount equals or exceeds the
            value.
          type: integer
        selectable:
          description: 'When true, the fee can get added manually.'
          type: boolean
        onTransaction:
          description: >
            The fee gets added when the check has a matching transaction. Useful
            for surcharges.
          type: string
          enum:
            - Account
            - Cash
            - CreditCard
            - Voucher
      example:
        feeId: 1
        name: Auto Gratuity
        allowedOrderClasses:
          - 1
        setPerCheck: true
        item:
          itemId: 999951
          fixed: null
          percentage: 15
          isGratuity: true
        always: false
        entreeCount: 20
        guestCount: 8
        selectable: false
        onTransaction: null
