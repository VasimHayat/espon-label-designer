    tax:
      type: object
      description: |
        Object whose keys are taxIds and values are tax objects.
      additionalProperties:
        type: object
        required:
          - taxId
          - name
          - label
          - taxType
          - effectiveRate
        properties:
          taxId:
            $ref: '#/components/schemas/integerId'
          name:
            type: string
          label:
            description: Used in receipt printing.
            type: string
          taxType:
            type: string
            description: |
              The exclusive type contributes to the taxTotal of an Order
              and the inclusive1 type contributes to the itaxTotal.
            enum:
              - exclusive
              - inclusive1
          rates:
            type: array
            description: |
              A tax table in *descending* order by row value.
              The rate of the last (least) row whose value compares less
              than the basis gets applied. Otherwise, the effectiveRate
              gets applied. A row with a value of zero (0) would never
              get applied.
              The below table shows rates for some basis values for the
              example tax (taxId 3).
              Basis   Rate
                 0    0.072
               200    0.072
              1000    0.072
              1001    0.075
              2000    0.075
              2001    0.080
              5000    0.080
              5001    0.300 # effectiveRate
              7000    0.300 # effectiveRate
            items:
              type: object
              description: A tax table row.
              properties:
                value:
                  $ref: '#/components/schemas/moneyValue'
                rate:
                  description: The *effective* rate for that row.
                  type: number
                  format: float
          effectiveRate:
            description: The tax rate or the tax rate after the max rates value.
            type: number
            format: float
      example:
        '1':
          taxId: '1'
          name: State
          label: State
          taxType: exclusive
          effectiveRate: 0.06
        '2':
          taxId: '2'
          name: Liquor Tax
          label: Liquor Tax
          taxType: inclusive1
          effectiveRate: 0.03
        '3':
          taxId: '3'
          name: Beer
          label: Beer
          taxType: exclusive
          rates:
            - value: 5000
              rate: 0.08
            - value: 2000
              rate: 0.075
            - value: 1000
              rate: 0.072
          effectiveRate: 0.3
