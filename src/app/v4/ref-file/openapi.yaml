    menuItem:
      type: object
      required:
        - itemId
        - name
        - buttonName
        - catId
      properties:
        itemId:
          type: number
        catId:
          type: integer
        name:
          type: string
        buttonName:
          description: Name displayed displayed for UI button.
          type: string
        remoteName:
          description: Name displayed or printed where prepared.
          type: string
        description:
          type: string
        upc:
          type: string
          description: >-
            Either null or a Site Unique code typically used for barcode /
            scaning lookup purposes.
          nullable: true
        isModifier:
          description: Item is used to modify other items.
          type: boolean
        isRollup:
          type: boolean
        rollupPrices:
          description: Only used for a menuItem that is-a menuGroup.
          type: boolean
        isMarketPrice:
          description: Means price will be entered at time of sale.
          type: boolean
          default: false
        entreeCount:
          description: >
            Set to the number of guests this item serves. A normal entree would
            have a value of 1. A non-entree (e.g., a drink) would have a value
            of 0 (the default).
          type: integer
          default: 0
        isForcedRing:
          description: >-
            < True if item qualifies for a forced ring requirement. Which means
            if forced ring is active, then at least one item, in each order,
            must have this setting true.
          type: boolean
          default: false
        ste:
          description: Makes item sales tax exempt when true.
          type: boolean
          default: false
        steFromOrderClass:
          description: |
            When true, the order item becomes Tax Exempt when;
            1. The orderClass for the order has a true "ste" property; and
            2. All the items contained in the same modifier tree also have
               steFromOrderClass set true.
          type: boolean
          default: false
        discBan:
          description: 'When true, the order item will not get discounted.'
          type: boolean
