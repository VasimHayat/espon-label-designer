openapi: 3.0.1
info:
  version: 2.55.0
  title: Transaction Server Application API (txi)
  license:
    name: restricted
  contact:
    email: apiteam@plumpos.io
servers:
  - url: 'https://txdev.plumpos.com/dev1/txi/v1'
    description: Development Sandbox
  - url: 'https://{url}/{basePath}/{version}'
    description: General URL format
    variables:
      url:
        default: txdev.plumpos.com
      basePath:
        default: dev1/txi
      version:
        default: v1
paths:
  /keySets:
    get:
      summary: List all the keySets used for txserver transmissions.
      operationId: global.listKeySets
      security:
        - apiKey: []
      tags:
        - init
      responses:
        '200':
          description: A list of each keySet.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/keySet'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/keySets/{keySetId}':
    post:
      summary: Sets the keySet used for txserver transmissions.
      operationId: global.setKeySet
      security:
        - apiKey: []
      tags:
        - init
      parameters:
        - name: keySetId
          in: path
          description: id of keySet
          required: true
          schema:
            type: string
      requestBody:
        description: The keySet.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/keySet'
      responses:
        '200':
          description: Success only.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Deletes the keySet.
      operationId: global.deleteKeySet
      security:
        - apiKey: []
      tags:
        - init
      parameters:
        - name: keySetId
          in: path
          description: id of keySet
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success only.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /salesMode/addAuth:
    post:
      summary: Add a new authentication token.
      operationId: salesMode.addAuth
      tags:
        - salesMode
      requestBody:
        description: The token.
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                salesModeToken:
                  type: string
      responses:
        '200':
          description: Returns true on success.
          content:
            application/json:
              schema:
                type: boolean
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /softwareVersions:
    put:
      summary: Set or Update the software versions object for txserver
      operationId: global.setSoftwareVersions
      security:
        - apiKey: []
      tags:
        - init
      requestBody:
        description: specifies the available set of software versions
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/softwareVersion'
      responses:
        '200':
          description: requested object was marked for resend
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /histories:
    get:
      summary: >
        Get listing of historical objects with their header information. 
        Parameters are optional query filter values. Parameters not present do
        not get their respective query filter applied.
      operationId: history.getHeaders
      security:
        - apiKey: []
      tags:
        - archive
      parameters:
        - name: objectType
          in: query
          description: >
            objectType to filter against. If not present all available
            objectTypes are included.
          required: false
          example: order
          schema:
            $ref: '#/components/schemas/objectType'
        - name: globalStoreId
          in: query
          description: globalStoreId to filter against.
          required: false
          example: 1234
          schema:
            type: integer
        - name: startBusDate
          in: query
          description: >
            Include business dates on or after this date. If not present then 
            no lower limit filter is applied.
          required: false
          example: '2025-09-30'
          schema:
            type: string
        - name: endBusDate
          in: query
          description: >
            Include business dates on or before this date. If not present then
            no upper limit filter is applied.
          required: false
          example: '2025-09-30'
          schema:
            type: string
        - name: startCreated
          in: query
          description: >
            Include headers with creation timestamps on or after this value.
            Value is expressed as the number of seconds since the epoch in UTC.
            If not present then no lower limit filter is applied.
          required: false
          example: 1539958251
          schema:
            type: integer
        - name: endCreated
          in: query
          description: >
            Include headers with creation timestamps on or before this value.
            Value is expressed as the number of seconds since the epoch in UTC.
            If not present then no upper limit filter is applied.
          required: false
          example: 1539958251
          schema:
            type: integer
        - name: startModified
          in: query
          description: >
            Include headers with modified timestamps on or after this value.
            Value is expressed as the number of seconds since the epoch in UTC.
            If not present then no lower limit filter is applied.
          required: false
          example: 1539958251
          schema:
            type: integer
        - name: endModified
          in: query
          description: >
            Include headers with modified timestamps on or before this value.
            Value is expressed as the number of seconds since the epoch in UTC.
            If not present then no upper limit filter is applied.
          required: false
          example: 1539958251
          schema:
            type: integer
      responses:
        '200':
          description: |
            an array containing the requested historical object headers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/histObjectBase'
                example:
                  - objectType: order
                    globalStoreId: 1234
                    storeId: 4
                    id0: 29918
                    id1: 0
                    busiDate: '2025-09-30'
                    created: 1539958251
                    modified: 1539958251
                  - objectType: timeslip
                    globalStoreId: 1234
                    storeId: 4
                    id0: 29918
                    id1: 0
                    busiDate: '2025-09-30'
                    created: 1539958251
                    modified: 1539958251
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/histories/stores/{globalStoreId}/objectTypes/{objectType}/id0s/{id0}/id1s/{id1}':
    get:
      summary: Gets a historical object
      operationId: history.getObject
      security:
        - apiKey: []
      tags:
        - archive
      parameters:
        - name: globalStoreId
          in: path
          description: global store id for store where settings are to be set
          required: true
          schema:
            type: integer
        - name: objectType
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/objectType'
        - name: id0
          in: path
          required: true
          schema:
            type: integer
        - name: id1
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: the requested historical object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/histObject'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/archives/{globalStoreId}/{archiveType}':
    get:
      summary: Return a one or more archive objects.
      operationId: archive.getObjects
      tags:
        - archive
      parameters:
        - name: globalStoreId
          in: path
          description: The store.
          required: true
          schema:
            type: integer
        - name: archiveType
          in: path
          description: The archive type.
          required: true
          schema:
            $ref: '#/components/schemas/archiveType'
        - name: id
          in: query
          description: One or more id values.
          required: true
          schema:
            type: array
            items:
              type: integer
      responses:
        '200':
          description: A list of matching archives.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/archiveObject'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/loyaltyChecks/{globalStoreId}':
    get:
      summary: Return a one or more loyalty checks.
      operationId: loyaltyChecks.get
      tags:
        - archive
      parameters:
        - name: globalStoreId
          in: path
          description: The store.
          required: true
          schema:
            type: integer
        - name: checkId
          in: query
          description: One or more checkId values.
          required: true
          schema:
            type: array
            items:
              type: integer
      responses:
        '200':
          description: A list of matching loyalty checks.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/loyaltyCheck'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /chains:
    get:
      summary: Used to get a set of chains and registrations
      operationId: global.getChains
      tags:
        - init
        - settings
      responses:
        '200':
          description: succesful chain information get response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/chainInfoSet'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/chains/{globalChainId}':
    post:
      summary: Used to create a new chain for use.
      operationId: settings.createNewChain
      tags:
        - init
      parameters:
        - name: globalChainId
          in: path
          description: global chain id for chain
          required: true
          schema:
            type: integer
      requestBody:
        description: Chain Registration
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/chainRegistration'
      responses:
        '200':
          description: succesful chain registration create operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      summary: Used to modify a chain
      operationId: settings.modifyChain
      tags:
        - init
      parameters:
        - name: globalChainId
          in: path
          description: global chain id for chain
          required: true
          schema:
            type: integer
      requestBody:
        description: Chain Registration
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/chainRegistration'
      responses:
        '200':
          description: succesful chain registration update operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Used to delete an existing chain
      operationId: settings.deleteChain
      tags:
        - init
      parameters:
        - name: globalChainId
          in: path
          description: global chain id for chain
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: succesful chain registration delete operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      summary: Used to get a chain info and/or test for its existence.
      operationId: settings.getChain
      tags:
        - init
        - settings
      parameters:
        - name: globalChainId
          in: path
          description: global chain id for chain
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: succesful chain information get response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/chainInfo'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/chains/{globalChainId}/stores':
    get:
      summary: Used to get a list of stores for a chain.
      operationId: settings.getStores
      tags:
        - init
        - settings
      parameters:
        - name: globalChainId
          in: path
          description: global chain id for chain
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: |
            Succesful store information set get response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/storeInfoSet'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/chains/{globalChainId}/stores/{globalStoreId}':
    get:
      summary: Used to get a single store for a chain.
      operationId: settings.getStore
      tags:
        - init
        - settings
      parameters:
        - name: globalChainId
          in: path
          description: global chain id for chain
          required: true
          schema:
            type: integer
        - name: globalStoreId
          in: path
          description: global store id for store
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: |
            Succesful store information get response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/storeInfo'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/stores/{globalStoreId}':
    post:
      summary: Used to create a new store for use.
      operationId: settings.createNewStore
      tags:
        - settings
        - init
      parameters:
        - name: globalStoreId
          in: path
          description: global store id for store where settings are to be set
          required: true
          schema:
            type: integer
      requestBody:
        description: Store Registration
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/storeRegistration'
      responses:
        '200':
          description: succesful store registration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      summary: Used to modify elements of an existing store (e.g. credentials)
      operationId: settings.modifyStore
      tags:
        - settings
        - init
      parameters:
        - name: globalStoreId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        description: Store Device Credentials object
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/storeRegistrationMutable'
      responses:
        '200':
          description: succesful store registration patch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Used to delete an existing store
      operationId: settings.deleteStore
      tags:
        - settings
        - init
      parameters:
        - name: globalStoreId
          in: path
          description: global store id for store to remove
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: succesful store registration removal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/stores/{globalStoreId}/archives/{archiveType}':
    post:
      summary: Have the txbus resend the archives.
      operationId: archive.resend
      tags:
        - archive
      parameters:
        - name: globalStoreId
          in: path
          description: global store id for store where settings
          required: true
          schema:
            type: integer
        - name: archiveType
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/archiveType'
      requestBody:
        description: The archive objects to get resent.
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/dataIds'
      responses:
        '200':
          description: Responds with true on success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/archiveResendResult'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/stores/{globalStoreId}/devices/{deviceId}':
    put:
      summary: Used to insert or update a store plum terminal device.
      operationId: device.put
      tags:
        - device
      parameters:
        - name: globalStoreId
          in: path
          description: global store id for store where settings
          required: true
          schema:
            type: integer
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: TerminalDevice definition.
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/terminalDevice'
      responses:
        '200':
          description: Responds with true on success.
          content:
            application/json:
              schema:
                type: boolean
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Used to remove a store plum terminal device.
      description: >
        The device will execute an unbrand when it can no longer authenticate
        from not having an entry in the txserver table.
      operationId: device.delete
      tags:
        - device
      parameters:
        - name: globalStoreId
          in: path
          description: global store id for store where settings
          required: true
          schema:
            type: integer
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Responds with true on success.
          content:
            application/json:
              schema:
                type: boolean
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/stores/{globalStoreId}/devices/{deviceId}/cmds/{cmdId}':
    post:
      summary: Used to send a store device command.
      operationId: cmd.post
      tags:
        - cmd
      parameters:
        - name: globalStoreId
          in: path
          description: global store id for store where settings
          required: true
          schema:
            type: integer
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: cmdId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/cmdId'
      requestBody:
        description: Arguments for cmd.
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                args:
                  $ref: '#/components/schemas/cmdArgs'
      responses:
        '200':
          description: Responds with true on success.
          content:
            application/json:
              schema:
                type: boolean
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      summary: Used to retreive the result of a store device command.
      operationId: cmd.get
      tags:
        - cmd
      parameters:
        - name: globalStoreId
          in: path
          description: global store id for store where settings
          required: true
          schema:
            type: integer
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: cmdId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/cmdId'
        - name: doDecode
          in: query
          description: Should the result get decoded.
          schema:
            default: false
            type: boolean
      responses:
        '200':
          description: Responds with the result.
          content:
            application/json:
              schema:
                type: string
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Used to remove a store device command.
      operationId: cmd.delete
      tags:
        - cmd
      parameters:
        - name: globalStoreId
          in: path
          description: global store id for store where settings
          required: true
          schema:
            type: integer
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: cmdId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/cmdId'
      responses:
        '200':
          description: Responds with true on success.
          content:
            application/json:
              schema:
                type: boolean
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/stores/{globalStoreId}/dump/{name}':
    get:
      summary: Used to dump a store setting for testing.
      operationId: settings.getSetting
      tags:
        - settings
      parameters:
        - name: globalStoreId
          in: path
          description: global store id for store where settings
          required: true
          schema:
            type: integer
        - name: name
          in: path
          description: 'The setting name (e.g., discounts).'
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The setting.
          content:
            application/json:
              schema:
                type: string
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/stores/{globalStoreId}/accounts':
    post:
      summary: Used to send new house account set to store
      operationId: settings.setHouseAccounts
      tags:
        - settings
      parameters:
        - name: globalStoreId
          in: path
          description: store id
          required: true
          schema:
            type: integer
      requestBody:
        description: hash of house account Objects using accountId keys
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/houseAccounts'
      responses:
        '200':
          description: succesful employee set operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/stores/{globalStoreId}/adjReasons':
    post:
      summary: Used to send new adjustment Reason set to store
      operationId: settings.setAdjReasons
      tags:
        - settings
      parameters:
        - name: globalStoreId
          in: path
          description: store id
          required: true
          schema:
            type: integer
      requestBody:
        description: hash of adjustment Reason Objects using adjReasonId keys
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/adjReasons'
      responses:
        '200':
          description: succesful employee set operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/stores/{globalStoreId}/areas':
    post:
      summary: Used to send new table area set to store
      operationId: settings.setAreas
      tags:
        - settings
      parameters:
        - name: globalStoreId
          in: path
          description: store id
          required: true
          schema:
            type: integer
      requestBody:
        description: hash of area Objects using area name for keys
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/areas'
      responses:
        '200':
          description: succesful employee set operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/stores/{globalStoreId}/debug':
    post:
      summary: Used to set store debugging.
      operationId: settings.setDebug
      tags:
        - settings
      parameters:
        - name: globalStoreId
          in: path
          description: store id
          required: true
          schema:
            type: integer
      requestBody:
        description: debug object
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/debugSetting'
      responses:
        '200':
