          $ref: '#/components/schemas/moneyValue'
        op:
          $ref: '#/components/schemas/op'
        unit:
          $ref: '#/components/schemas/unit'
        tare:
          type: number
        isWeighed:
          type: boolean
        overrides:
          description: A list of override ids with price.
          type: array
          items:
            type: object
            properties:
              price:
                $ref: '#/components/schemas/moneyValue'
              id:
                type: integer
        style:
          $ref: '#/components/schemas/style'
        vprinters:
          type: array
          items:
            type: integer
        orderClasses:
          description: Exclusive list of orderClass id values (for menu building).
          type: array
          items:
            type: integer
        cookTime:
          type: number
          default: null
        calories:
          type: number
        rating:
          type: number
        fqList:
          type: array
          description: A list of forcedQuestion Id values.
          items:
            type: integer
        availableTimes:
          description: A list of eventIds which indicate the menuItem availibility.
          type: array
          items:
            type: number
        allowedPlatforms:
          type: array
          items:
            $ref: '#/components/schemas/platforms'
        typeId:
          type: string
          enum:
            - combo
            - comboItem
            - fq
            - giftCard
            - group
            - item
            - location
            - menuItem
            - mixed
            - pack
            - pizza
            - portion
            - recipeMod
            - variation
        subType:
          type: string
          enum:
            - portion
            - 'no'
            - sub
        groupId:
          description: The itemId of the fq creation group. (deprecated)
          type: integer
        parentId:
          description: The itemId of the parent menuItem (used in variations).
          type: integer
        rootItemId:
          description: >
            The itemId of the root menuItem for this menuItem. Used since forced
            questions create a new menuitem, but discount and tag settings (used
            in discounts) refer to the root menuItem and not the forced question
            menuItem.
          type: integer
        cRootItemId:
          type: integer
        cRootItemGroupId:
          type: integer
        comboItemIds:
          type: array
          items:
            type: integer
        defaultLocId:
          type: integer
        varId:
          description: The variation.
          type: integer
        min:
          description: The minimum.
          type: integer
        max:
          description: >
            The maximum.  Note that maximum ≥ minimum. We define an irrelevant
            or unrestricted min and max setting as one that has both set to zero
            (0).
          type: integer
        isRemoveOther:
          description: >
            When true, indicates item was omitted and it can no longer have any
            other modifiers or substitutions.
          type: boolean
        isItemLevelRecipe:
          type: boolean
        isVariationLvlPricing:
          type: boolean
        isSubstituteEnabled:
          type: boolean
        recipeFactor:
          type: number
        pricePercentage:
          type: number
        freeQnt:
