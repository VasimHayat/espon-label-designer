                  routingInfo:
                    type: string
                    default: null
                    nullable: true
                  printers:
                    type: array
                    description: >
                      The list of physical printers that will receive print
                      requests for this virtual printer. The priority integer
                      property defines the failover sequence such that the
                      lowest priority value is tried first, with failover
                      attempts made in ascending priority order through the
                      array until a successful  print is made or the list is
                      exhausted.
                    items:
                      $ref: '#/components/schemas/vPrinterItem'
              example:
                '2':
                  vprinterId: '2'
                  name: Bar
                  routingInfo: null
                  printers:
                    - priority: '0'
                      printerId: '7'
                      name: Bar
                    - printerId: '8'
                      priority: '1'
                      name: Kitchen
                    - priority: '2'
                      printerId: '9'
