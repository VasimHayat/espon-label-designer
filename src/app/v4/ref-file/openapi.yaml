    ticketId:
      description: |
        A chain unique, base16 value of a 64 bit integer consisting of
        of the pos checkId and the storeId.

        The storeId consists of a zero left padded integer with a length
        of six digits (e.g., 001234).

        Depending on the setting, the ticketId gets printed on the receipt
        as a barcode or a QRcode.

        Online Checks will have an 'x' prefix to the ticketId to avoid
        collision when the check arrives at the store and gets a
        different ticketId value. The online ticketId will appear in
        the check as the onlineId.

        The below example base10 value equals, 1234567001001234,
          - checkId 1234567001
          - storeId 001234
          - ticketId 462d5078bcd12
          - online ticketId x462d5078bcd12
      type: string
      example: 462d5078bcd12
