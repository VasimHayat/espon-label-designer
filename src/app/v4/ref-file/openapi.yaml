    discount:
      type: object
      required:
        - discountId
        - name
        - selectable
        - appliesTo
      properties:
        discountId:
          type: integer
        altId:
          description: 'An alternate id, possibly from a loyalty provider.'
          type: integer
        buttonName:
          type: string
        name:
          type: string
        selectable:
          type: boolean
        startTime:
          $ref: '#/components/schemas/epoch'
        endTime:
          $ref: '#/components/schemas/epoch'
        eventId:
          description: The event that controls the application of this discount.
          type: integer
        jobs:
          description: >
            Provides a list of job ids over who may apply this discount. If
            empty then then all jobs may apply it.
          type: array
          items:
            type: integer
        orderClasses:
          description: >
            A inclusive list of orderClass id values. An empty list means no
            restriction on orderClasses for the discount. The validation occurs
            only on transaction creation and the system will not remove
            non-applicable discounts upon change of orderClass.
          type: array
          items:
            type: integer
        terminals:
          description: >
            A inclusive list of terminal id values. An empty list means no
            restriction on terminals for the discount. The system will use the
            requesting terminal.
          type: array
          items:
            type: integer
        requireManager:
          type: boolean
        countsTowardMax:
          description: >
            When true, this discount will count toward the rule of
            order.maxDiscountsPerCheck.
          type: boolean
        maxPerCheck:
          description: >
            When non-zero, the maximum number of times this discount may occur
            on a Check.
          type: integer
        isReasonRequired:
          description: 'When true, using this discount requires an adjReasonId input.'
          type: boolean
        ascendingPriceTargets:
          description: >
            When true, sorts targets by ascending price (least expensive first).
            When false, sorts targets by descending price (most expensive
            first).
          default: true
          type: boolean
        discBanOverride:
          description: >
            When true, it overrides the order item discBan, so that the discount
            will use the entire subtotal and distribute its amount to each order
            item.
          type: boolean
        autoApply:
          description: >
            Only valid for *item* *appliesTo*. When true, the pa will
            automatically add this discount whenever it applies, unless the
            Check has a Voided transaction with this discount. When a check has
            a Voided transaction with this discount, another transacation with
            this discount can still get applied manually.
          type: boolean
        applyCount:
          description: >
            (Only for *item* *appliesTo*.) The number of times the discount can
            apply itself. A value of 0 means no limit.
          default: 1
          type: integer
        minSubtotal:
          $ref: '#/components/schemas/moneyValue'
        maxAmount:
          $ref: '#/components/schemas/moneyValue'
        valueType:
          $ref: '#/components/schemas/discountValueType'
        value:
          $ref: '#/components/schemas/discountValue'
        appliesTo:
          description: >
            Simple discounts will use the *check* setting and require a
            *valueType* and *value*. Complicated discounts will use *item*
            setting and require *triggers* and optionally, *targets*.
          type: string
          enum:
            - check
            - item
        code:
          description: Used by a customer.
          type: string
        codeIsOnlineOnly:
          type: boolean
        triggers:
          description: >
            The Must-Buy sets. Activated when the Check has an equal or greater
            quantities for each set quantity. Multiple activations can occur for
            each occurance of set quantities.
          type: array
          items:
            type: object
            properties:
              quantity:
                type: integer
              typeId:
                type: string
                enum:
                  - menuCat
                  - menuItem
                  - tag
              id:
                description: 'Either catId, itemId or tagId (depends on the *typeId*).'
                type: integer
              isMultiItemAllowed:
                description: >
                  Only applies with a *quantity* > 1. When true, any items in
                  set can count for quantity. When false, only the same items in
                  set can count for quantity.
                type: boolean
        targets:
          description: >
            The Discounted sets. Activated when the triggers become activated
            and the Check has an equal or greater quantities for each set
            quantity. Multiple activations can occur for each occurance of set
            quantities. Each set contributes to the discount as a function of
            its *valueType* and *value*.
          type: array
          items:
            type: object
            properties:
              quantity:
                type: integer
              typeId:
                type: string
                enum:
                  - menuCat
                  - menuItem
                  - tag
              id:
                description: 'Either catId, itemId or tagId (depends on the *typeId*).'
                type: integer
              useChildSumPrice:
                type: boolean
