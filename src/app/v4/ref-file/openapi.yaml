          $ref: '#/components/schemas/epoch'
        takenTime:
          $ref: '#/components/schemas/epoch'
    orderClass:
      type: object
      description: A mapping between orderClassIds and orderClass objects.
      additionalProperties:
        type: object
        required:
          - orderClassId
          - name
          - selectable
          - mutable
        properties:
          orderClassId:
            $ref: '#/components/schemas/integerId'
          name:
            type: string
          selectable:
            type: boolean
          startTime:
            $ref: '#/components/schemas/epoch'
          endTime:
            $ref: '#/components/schemas/epoch'
          mutable:
            type: boolean
          ste:
            description: >
              When true, the system makes all order items having a true
              steFromOrderClass property sales tax exempt, as long as all
              descendant and ascendant modifiers also have a true
              steFromOrderClass property.
            type: boolean
            default: false
          require:
            $ref: '#/components/schemas/require'
      example:
        '1':
          orderClassId: '1'
          name: Dine-In
          selectable: true
          startTime: 1633548687
          endTime: null
          mutable: true
          ste: false
        '2':
          orderClassId: '2'
          name: To Go
          selectable: true
          startTime: 1633548687
          endTime: 1638948771
          mutable: true
          ste: false
          requires: namePhone
        '3':
          orderClassId: '3'
          name: Delivery
          selectable: false
          startTime: null
          endTime: null
          mutable: true
          ste: false
          requires: namePhoneAddress
    orderClasses:
