    printers:
      type: object
      description: |
        Object whose keys are printerIds and values are printer objects.
      additionalProperties:
        $ref: '#/components/schemas/printerObj'
    printerObj:
      type: object
      description: |
        A printer has a default deviceType of *Escp* which stands for
        the Epson Standard Code for Printers (ESC/P).
        A port of 9888 will select the ChefTab without a deviceType.
        Use *Escp* when using a normal ribben (black and red) printer.
        Use *Escpt* when using a thermal printer.
        Use *Label* when using a ZPL label printer.
        Use *EscpLabel* when using a escp label printer.
      required:
        - printerId
        - deviceType
        - name
        - ipaddr
      properties:
        printerId:
          type: integer
        deviceType:
          type: string
          enum:
            - Escp
            - Escpt
            - ChefTab
            - Label
            - EscpLabel
        name:
          type: string
        ipaddr:
          type: string
        blockedOrderClassIds:
          type: array
          items:
            type: integer
        blockedTerminalIds:
          type: array
          items:
            type: integer
        fontSize:
          description: The system uses medium if not provided.
          type: string
          enum:
            - small
            - medium
            - large
            - extraLarge
        hr:
          description: >
            Horizontal Rule (hr) character. By default '*'. Only use a single
            printable ascii character.
          type: string
        sections:
          $ref: '#/components/schemas/printerSection'
        template:
          type: object
          properties:
            maxLengths:
              description: |
                A map of keys to maxLength. See zpl below for key names.
                The *modifiers* key name limits the modifier item name.
              type: object
              additionalProperties:
                type: integer
            modifiers:
              type: object
              properties:
                x:
                  description: The initial x coordinate.
                  type: integer
                'y':
                  description: The initial y coordinate.
                  type: integer
                xd:
                  description: The delta x coordinate.
                  type: integer
                yd:
                  type: integer
                  description: The delta y coordinate.
                max:
                  description: The maximum number of allowed modifiers.
                  type: integer
            zpl:
              description: |
                A zpl label string with embedded variables.
                An embedded variable name has one of the following
                names surrounded by a "{" and a "}, e.g., "{id}".
                  - createdTime # h:mm a
                  - createdDate # M/d
                  - customerName
                  - customerPhone
                  - deliveryFee
                  - id (orderId)
                  - itemCount
                  - itemIndex
                  - itemName
                  - modifiers
                  - name (order mame)
                  - onlineId
                  - onlineProvider
                  - originalReadyTime # h:mm a
                  - orderClass
                  - readyTime # h:mm a
                  - subtotal
                  - tax
                  - total
              type: string
      example:
        '7':
          printerId: 7
          name: Bar
          ipaddr: 192.168.1.151
        '8':
          printerId: 8
          deviceType: EscpLabel
          name: My Lovely Label
          ipaddr: 10.10.10.88
        '9':
          printerId: 9
          deviceType: Escp
          name: Lobby Printer
          ipaddr: 192.168.1.10
        '14':
          printerId: 14
          name: Label
          ipaddr: '192.168.0.15:9100'
          deviceType: Label
          template:
            maxLengths:
              id: 0
              name: 27
              orderClassName: 30
              itemName: 20
              modifiers: 20
            modifiers:
              x: 10
              'y': 70
              xd: 0
              yd: 30
              max: 6
              zpl: >-
                ^xa\n\n^ci28\n^cf0,30\n\n^fo 370,20  ^fd{name}^fs\n^fo 680, 20
                ^fd#{id}^fs\n\n^fo 280,52 ^gb 821,1 ^fs\n^fo 280,0 ^gb 1,270
                ^fs\n\n^cf0,23\n^fo 290, 70 ^fdDelivery:^fs\n^fo 400, 70 ^fb
                100,1,0,R ^fd{deliveryFee}^fs\n^fo 290,100 ^fdSubtotal:^fs\n^fo
                400,100 ^fb 100,1,0,R ^fd{subtotal}^fs\n^fo 290,130
                ^fdTax:^fs\n^fo 400,130 ^fb 100,1,0,R ^fd{tax}^fs\n^fo 290,160
                ^fdTotal:^fs\n^fo 400,160 ^fb 100,1,0,R ^fd{total}^fs\n\n^fo
                570, 70 ^fd{onlineProvider}^fs\n^fo 570,100
