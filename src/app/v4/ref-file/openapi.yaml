    alert:
      description: |
        The txserver injects the *store* type alerts.
        All other alerts injected by the store software.
        Only store injected alerts can get acknowledged.

        An alert gets generated when it does not yet exist or
        when either the state or the acknowledgement changes.

        Any alerts with a uniqueId will have a uniqueIdIndex maintained
        in the store database to create unique alertId values.

        The following documentation has the format,
        type
          -> subType
            - other-property. A comment about the other-property.

        store
          -> access
            - state. Offline when store primary has not accessed txserver in last 5 minutes.
          -> settingsDownload
            - state. Offline when settings request from store has not
                occurred in last 5 minutes.
          -> settingsCompletion
            - state. Offline when any settings completion request following a download has not
                been received within 5 minutes of download.
          -> outstoreStatus
            - state. Offline whenever access is offline or when store manager commanded offline.
          -> tdevice
            - state. Offline when terminalDevice (tdevice) has not accseed txserver
                in last 5 minutes.
            - message. A csv list of deviceId values for offline devices.

        tx
          -> (no subTypes)
            - state. Offline on any network failure (connection or DNS).

        db
            -> replication
              - state. Offline when no secondary has replicated in last 30 seconds.
            -> setup
              - state. Offline when no-secondaries were setup.

        menu
          -> upcDuplicated
            - state. Offline when one or more menu item upc values were duplicated.

        payDevice
          -> access
            - uniqueId. The ipaddr or tdeviceId of the device.
            - state. Offline when network or usb failue with any
                request (batch, transaction, etc.).
          -> unbatched
            - uniqueId. The ipaddr or tdeviceId of the device.
            - state. Offline when no batch has occurred for the previous day.
          -> demoMode
            - uniqueId. The ipaddr or tdeviceId of the device.
            - state. Always Offline demoMode detected or set.

        giftcard (Note that the subTypes equal the giftcard processor name.)
          -> givex
            - state. Offline when the store can not access the givex server (connection or DNS).
          -> gsg
            - state. Offline when the store can not access the gsg server (connection or DNS).
          -> svs
            - state. Offline when the store can not access the svs server (connection or DNS).
          -> valutec
            - state. Offline when the store can not access the valutec server (connection or DNS).

        playcard (Note that the subTypes equal the playcard provider name.)
          -> amc
            - state. Offline when the store can not access the amc server (connection or DNS).

        online (state essentially meaningless and always offline).
          -> outstoreBadEnum
          -> mpfTaxDifferences
        loyalty (Note that the subType depend on the processor name.)
          -> punchh
            - state. Offline on any network failure (connection or DNS).
          -> punchhUpload
            - state. Offline on any network failure (connection or DNS).
          -> sparkfly
            - state. Offline on any network failure (connection or DNS).
          -> sparkflyUpload
            - state. Offline on any network failure (connection or DNS).
          -> zip
            - state. Offline on any network failure (connection or DNS).
          -> zipUpload
            - state. Offline on any network failure (connection or DNS).

        outstoreCancel
          -> (no subTypes)
            - state. Offline on network failure.
            - message. Failure message.

        receiptPrinter
          -> (no subTypes)
            - uniqueId. The ipaddr or tdeviceId of the printer.
            - state. Offline on network failure if networked or usb disconnect.

        remotePrinter
          -> (no subTypes)
            - uniqueId. The ipaddr of the printer.
            - state. Offline on network failure.
            - message. The message will include printer id and name.

        usbDevice
          - scale
            - state. Offline on usb disconnect.

        version
          -> (no subTypes)
            - state. Always online.
            - message. A csv list of versions. Each version contains a colon seperated name and value.
      type: object
      required:
        - alertId
        - seqId
        - created
        - type
        - subType
        - state
      properties:
        alertId:
          description: >
            100,000*uniqueIdIndex + 100*typeId + subTypeId. Value used in
            txdata.id0. The uniqueIdIndex equals 0 for alerts without a
            uniqueId.
          type: integer
        seqId:
          description: >
            Strickly increasing monotonic sequence for the given alertId. Value
            used in txdata.id1.
          type: integer
        created:
          $ref: '#/components/schemas/epoch'
        type:
          type: string
          enum:
            - store
            - tx
            - db
            - payDevice
            - giftcard
            - loyalty
            - receiptPrinter
            - remotePrinter
            - usbDevice
            - playcard
            - menu
            - poService
            - safeCountCheck
            - kds
            - online
        subType:
          description: Depends on type.
          type: string
          nullable: true
          enum:
            - null
            - access
            - settingsDownload
            - settingsCompletion
            - outstoreStatus
            - tdevice
            - replication
            - setup
            - upcDuplicated
            - unbatched
            - demoMode
            - givex
            - svs
            - valutec
            - gsg
            - outstoreBadEnum
            - mpfTaxDifference
            - punchh
            - punchhUpload
            - zip
            - zipUpload
            - sparkfly
            - sparkflyUpload
            - scale
            - amc
        uniqueId:
          nullable: true
          description: >
            The value depends on the type and the subType and it can have a null
            value. A network connected device will have its ip-address (ipaddr)
            for a value. A usb connected device will have the terminalDevice
            deviceId (tdeviceId) to which it connects for a value.
          type: string
        ack:
          description: acknowledgement of alert.
          nullable: true
          type: object
          properties:
            didAck:
              type: boolean
            when:
              $ref: '#/components/schemas/epoch'
            timeslipId:
              type: integer
        state:
          type: string
          enum:
            - online
            - offline
            - unknown
        message:
          description: Only non-null if state equals offline.
          nullable: true
          type: string
