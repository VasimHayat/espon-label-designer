    check:
      type: object
      description: >
        A check summarizes and describes the payments and taxes for an order. A
        check can contain zero or more transactions. The system closes a check
        when the sum of the applied values for all non-voided transactions is
        equal to or greater than the check total and there are no Processing
        transactions.
      required:
        - cn
        - printCount;
        - printCountClosed;
        - isClosed
        - subtotal
        - subtotalTaxable
        - subtotalExempt
        - taxTotal
        - itaxTotal
        - taxTotalFee
        - itaxTotalFee
        - fudge
        - cashTotal
        - discountTotal
        - compTotal
        - total
        - balance
        - cashBalance
        - balanceNonCash
        - change
        - taxExempt
        - giftcardItemAmount
        - feeTotal
        - created
      properties:
        cn:
          type: integer
          description: The check number (start at 1 and increments).
          minimum: 1
        printCount:
          type: integer
          description: The number of times this check was printed.
        printCountClosed:
          type: integer
          description: The number of times this check was printed when closed.
        isClosed:
          type: boolean
        subtotal:
          allOf:
            - $ref: '#/components/schemas/moneyValue'
            - description: subtotal = subtotalTaxable + subtotalExempt.
        subtotalTaxable:
          allOf:
            - $ref: '#/components/schemas/moneyValue'
            - description: The total of all taxable items.
        subtotalExempt:
          allOf:
            - $ref: '#/components/schemas/moneyValue'
            - description: The total of all sales tax exempt items.
        taxTotal:
          allOf:
            - $ref: '#/components/schemas/moneyValue'
            - description: |
                The amount of exclusive tax for the check (added to the total).
        itaxTotal:
          allOf:
            - $ref: '#/components/schemas/moneyValue'
            - description: Inclusive tax total (not added to total).
        taxTotalFee:
          allOf:
            - $ref: '#/components/schemas/moneyValue'
            - description: >
                The amount of exclusive tax for the check fees (added to the
                total).
        itaxTotalFee:
          allOf:
            - $ref: '#/components/schemas/moneyValue'
            - description: Inclusive tax total fees (not added to total).
        fudge:
          $ref: '#/components/schemas/moneyValue'
        cashTotal:
          allOf:
            - $ref: '#/components/schemas/moneyValue'
            - description: total + fudge
        discountTotal:
          $ref: '#/components/schemas/moneyValue'
        compTotal:
          $ref: '#/components/schemas/moneyValue'
        total:
          allOf:
            - $ref: '#/components/schemas/moneyValue'
            - description: (subtotal + taxTotal + feeTotal + taxTotalFee) - discountTotal
        balance:
          $ref: '#/components/schemas/moneyValue'
        cashBalance:
          allOf:
            - $ref: '#/components/schemas/moneyValue'
            - description: 'hasCash ? balance '':'' balance + fudge'
        balanceNonCash:
          allOf:
            - $ref: '#/components/schemas/moneyValue'
            - description: 'hasCash ? remainingTotal + cashAmount '':'' remainingTotal'
        change:
          $ref: '#/components/schemas/moneyValue'
        taxes:
          type: array
          description: A list of all taxes applied to this check.
          items:
            $ref: '#/components/schemas/taxValue'
        taxExempt:
          type: boolean
          description: The tax-exempt status for the Order Check. The default is false.
        taxExemptId:
          type: string
          description: >
