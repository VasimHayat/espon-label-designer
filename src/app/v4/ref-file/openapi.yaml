    txswitch:
      description: |
        The txswitch object on the current txserver (ctx) and
        the new txserver (ntx).

        The txswitch essential procedure.

        1.  hubworks (hw) sends cmd(begin) to ctx.
            a.  "post /stores/{gsid}/txswitch".
            b.  Fails if txswitch in progress.
            c.  Sets ntx(url,password) and cmd = "begin".
            d.  Disables outstore.
            e.  Returns txswitch object (which has latest archive-id values).

        2.  hw updates sso for device registration request.
            a.  If nothing else occurs, the store will switch to ntx in the next 30 minutes.
            b.  The status check (see 5 below) and track progress.

        3.  hw updates ntx with latest settings and device data.
            a.  hw uses latest archive-id values from 1.e.
            b.  "put /stores/{gsid}/txswitch"

        4.  hw sends cmd(go) to ctx.
            a.  "get /stores/{gsid}/txswitch/go"
            b.  Gets and returns txswitch (which has latest archive-id values).
            c.  If different archive-id values, hw could update ntx.

        5.  Store switches to ntx.
            a.  Terminal notified of switch from ctx "post /settings.plumDevice".
            b.  non-primary terminals will just switch to ntx.
            c.  primary terminal will switch to ntx and then upload archive data from last day(s).

        6.  hw checks status using,
              ctx "get /stores/{gsid}/txswitch" returns txswitch
              ntx "get /stores/{gsid}/txswitch" returns txswitch (only devices)

        7.  hw sends cmd(complete) to ctx.
            a.  "get /stores/{gsid}/txswitch/complete"
            b.  Removes txswitch tracking data.
            c.  Allows reverting (same procedure, but now ctxPrev = ntx and ntxPrev = ctx).

        8.  hw redirects outstore to ntx.

        9.  hw sends cmd(abort) to ctx.
            a.  "get /stores/{gsid}/txswitch/abort"
            b.  Allowed after step 1, 2 and 3.
            c.  Allowed after step 4, but might fail if any terminal switched.
      type: object
      properties:
        cmd:
          $ref: components/schemas/txswitchCmd.yaml
        lastCmdTime:
          $ref: components/schemas/epoch.yaml
        txconn:
          $ref: components/schemas/txconn.yaml
        nextIds:
          $ref: components/schemas/nextIds.yaml
        devices:
          type: array
          items:
            type: object
            properties:
              deviceId:
                type: string
              isSwitched:
                type: boolean
              lastAccess:
                $ref: components/schemas/epoch.yaml
    txswitchCmd:
      type: string
      enum:
        - begin
        - go
        - complete
        - abort
    unit:
      type: string
      enum:
        - lb
        - oz
        - lboz
        - kg
        - g
