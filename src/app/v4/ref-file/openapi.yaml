                A list of times to automatically reboot the terminal.
                If not set, the terminal will automatically reboot at the
                default time of 30 minutes after the locBizStartMin.
                Each time should always occur at least 30 before or after
                locBizStartMin to allow for batch processing to start
                on time or finish.
              type: array
              items:
