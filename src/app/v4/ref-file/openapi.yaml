    outstore:
      description: The setup for outstore orders.
      type: object
      required:
        - terminalId
        - employeeId
        - destination
      properties:
        terminalId:
          type: integer
        employeeId:
          type: integer
        defaultDiscountId:
          description: >
            The id of a non-selectable discount. Used whenever a discount
            transaction did not provide a discountId or when the discountId was
            not found in the store discounts.
          type: integer
        orderClassMap:
          type: object
          description: |
            A mapping between a selector and orderClassIds.

            The selector consists of two parts, a source and a
            destination [see destination](#/components/schemas/destination).
            concatenated together.

            The source part consists of an onlineProvider (e.g., "olo"),
            possibly concatenated with a source brand (e.g., "doordash").
            All current possible values: "olo", "chowly", "olodoordash",
            "ologrubhub", "olouber", "olopostmates", "ologoogle",
            "olobitesquad", "olowaitr" and "olounknown".

            The source and destination can also use the string "any"
            for matching (e.g., "oloany").

            The pa will use "any" for a null value of source or destination.

            The pa will first attempt a matching using the source and
            destination together.
            If no match was found, it will then substitute "any" for the
            destination.
            If no match was found it will substitute "any" for the source.
            If no match was found it will substitute "any" for both the
            source and destination.
            If no match was found, the pa will assign an orderClass based
            on the outstore employee job first and then the outstore
            terminal if none found.

            Every permuation of the selector source and destination need
            not have an occurance in the orderClassMap.
          additionalProperties:
            type: object
            properties:
              orderClassId:
                type: integer
      example:
        terminalId: 9
        employeeId: 99
        defaultDiscountId: 77
        orderClassMap:
          anyany: 41
          olotakeout: 42
          oloany: 43
          olodoordashany: 44
          oloubertakeout: 45
          chowlyany: 46
