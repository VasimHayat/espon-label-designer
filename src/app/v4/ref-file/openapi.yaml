components:
  schemas:
    activeEvent:
      type: object
      properties:
        eventId:
          type: integer
        name:
          type: string
        startTime:
          $ref: '#/components/schemas/epoch'
        endTime:
          $ref: '#/components/schemas/epoch'
        isActive:
          type: boolean
    accessed:
      type: object
      properties:
        objectType:
          type: string
          enum:
            - accessed
        ipaddr:
          type: string
        deviceId:
          type: string
        secondaries:
          type: array
          items:
            type: object
            properties:
              deviceId:
                type: string
              lastAccess:
                $ref: '#/components/schemas/epoch'
        settings:
          type: object
          properties:
            accounts:
              $ref: '#/components/schemas/setting'
            adjReasons:
              $ref: '#/components/schemas/setting'
            areas:
              $ref: '#/components/schemas/setting'
            discounts:
              $ref: '#/components/schemas/setting'
            employees:
              $ref: '#/components/schemas/setting'
            giftCardGroups:
              $ref: '#/components/schemas/setting'
            jobs:
              $ref: '#/components/schemas/setting'
            loyaltySetup:
              $ref: '#/components/schemas/setting'
            menuCats:
              $ref: '#/components/schemas/setting'
            menuEvents:
              $ref: '#/components/schemas/setting'
            menuItems:
              $ref: '#/components/schemas/setting'
            menuScreens:
              $ref: '#/components/schemas/setting'
            messages:
              $ref: '#/components/schemas/setting'
            orderClasses:
              $ref: '#/components/schemas/setting'
            paymentReasons:
              $ref: '#/components/schemas/setting'
            printers:
              $ref: '#/components/schemas/setting'
            rules:
              $ref: '#/components/schemas/setting'
            store:
              $ref: '#/components/schemas/setting'
            tags:
              $ref: '#/components/schemas/setting'
            taxes:
              $ref: '#/components/schemas/setting'
            terminals:
              $ref: '#/components/schemas/setting'
            voucherTypes:
              $ref: '#/components/schemas/setting'
    address:
      type: object
      properties:
        street1:
          type: string
        street2:
          type: string
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        notes:
          type: string
        coordinates:
          type: object
          required:
            - latitude
            - longitude
          properties:
            latitude:
              type: number
              format: double
            longitude:
              type: number
              format: double
    account:
      type: object
      description: An update to hubworks of an account.
      properties:
        objectType:
          type: string
          enum:
            - account
        accountId:
          $ref: '#/components/schemas/integerId'
        atn:
          type: integer
        balance:
          $ref: '#/components/schemas/moneyValue'
        limit:
          $ref: '#/components/schemas/moneyValue'
        name:
          $ref: '#/components/schemas/personName'
        modified:
          $ref: '#/components/schemas/epoch'
        reconciled:
          $ref: '#/components/schemas/epoch'
        usesDept:
          type: boolean
        paymentOverdue:
          type: boolean
        customerId:
          type: string
        taxExemptId:
          type: string
        primaryPhoneNumber:
          type: string
        unreconciled:
          description: |
            Either a set of debits or a set of credits.
            When debits, then a set of debits that have not paid for
            by credits and the amount left unpaid for each debit.
            When credits, then a set of credits that have not been
            used to pay for debits and the amount available to pay to
            debits.
            The pa reconciles debits using credits in cronological
            order and with the initial account balance.
          type: array
          items:
            type: object
            properties:
              atn:
                type: integer
              value:
