      example: 1539958251
    Error:
      description: based on rfc7807
      type: object
      properties:
        type:
          description: >
            A uri in rfc7807, but just an enum for now. Certainly a uri could
            get created with type using e.g., it in a query string.
          type: string
        title:
          type: string
        status:
          description: HTTP response status codes
          type: integer
        detail:
          type: string
        requireManager:
          description: extension of rfc7807
          type: boolean
      required:
        - type
